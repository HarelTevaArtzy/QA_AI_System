services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qa-ai-system
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-Agentic QA System}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/qa_system.db}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-ADMIN123}
      AGNO_PROVIDER: ${AGNO_PROVIDER:-disabled}
      AGNO_MODEL: ${AGNO_MODEL:-llama3.1:8b}
      AI_BASE_URL: ${AI_BASE_URL:-http://localhost:11434}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://localhost:8001}
      SYNC_ENRICHMENT: ${SYNC_ENRICHMENT:-false}
    volumes:
      - qa_ai_data:/app/data
    restart: unless-stopped

volumes:
  qa_ai_data:
